<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mod Panel - Toonator</title>

<link rel="shortcut icon" href="/img/favicon-eyes.png">
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/css/font.css">
<link rel="stylesheet" href="/css/images.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const { createClient } = supabase;

const db = createClient(
  "https://ytyhhmwnnlkhhpvsurlm.supabase.co",
  "YOUR_ANON_KEY"
);

let currentUserRole = null;

async function promptLogin() {
  const email = prompt("Admin email:");
  if (!email) return;

  const password = prompt("Password:");
  if (!password) return;

  const { error } = await db.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert("Login failed: " + error.message);
    return;
  }

  location.reload();
}

async function logout(){
  await db.auth.signOut();
  location.reload();
}

async function init(){

  const { data:{ user } } = await db.auth.getUser();

  if(!user){
    const denied = document.getElementById("access-denied");
    denied.innerHTML = `
      Moderator login required.<br><br>
      <button class="mod-btn btn-search" onclick="promptLogin()">Sign In</button>
    `;
    denied.style.display = "block";
    return;
  }

  const { data: profile } = await db
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .single();

  currentUserRole = profile?.role || "user";

  if(currentUserRole !== "mod" && currentUserRole !== "admin"){
    document.getElementById("access-denied").style.display="block";
    return;
  }

  document.getElementById("mod-content").style.display="block";

  loadIpBans();
}

function escapeHTML(str){
return String(str||"")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;")
}

function showStatus(msg,ok=true){
const el=document.getElementById("mod-status")
el.textContent=msg
el.className="mod-status "+(ok?"ok":"err")
setTimeout(()=>{el.className="mod-status"},4000)
}

async function searchUser(){

const username=document.getElementById("search-username").value.trim()

if(!username)return

const {data}=await db
.from("profiles")
.select("id,username,role")
.ilike("username",username)
.limit(5)

const el=document.getElementById("user-result")

if(!data||data.length===0){
el.innerHTML='<div style="color:#888;font:12pt ToonatorFont;">No users found.</div>'
return
}

el.innerHTML=data.map(u=>`
<div class="user-card">
<div class="uname ${escapeHTML(u.role)}">${escapeHTML(u.username)}</div>
<div class="umeta">Role: ${escapeHTML(u.role)}</div>
<div class="uactions">
<button class="mod-btn btn-ban" onclick="confirmBan('${escapeHTML(u.id)}','${escapeHTML(u.username)}')">
Ban & Delete
</button>
</div>
</div>
`).join("")
}

async function setRole(){

const username=document.getElementById("role-username").value.trim()
const role=document.getElementById("role-select").value

if(!username)return

if(currentUserRole!=="admin"){
showStatus("Only admins can change roles.",false)
return
}

const {data}=await db
.from("profiles")
.update({role})
.ilike("username",username)
.select("username,role")

if(!data||data.length===0){
showStatus("User not found.",false)
return
}

showStatus(`Role updated for ${data[0].username}`)
}

async function loadIpBans(){

const {data}=await db
.from("banned_ips")
.select("ip,reason,banned_at")
.order("banned_at",{ascending:false})

const el=document.getElementById("ip-list")

if(!data||data.length===0){
el.innerHTML="No banned IPs."
return
}

el.innerHTML=`<table class="ip-table">
<thead>
<tr>
<th>IP</th>
<th>Reason</th>
<th>Date</th>
<th></th>
</tr>
</thead>
<tbody>
${data.map(row=>`
<tr>
<td><code>${escapeHTML(row.ip)}</code></td>
<td>${escapeHTML(row.reason||"—")}</td>
<td>${row.banned_at?new Date(row.banned_at).toLocaleDateString():"—"}</td>
<td>
<button class="mod-btn btn-remove" onclick="removeIpBan('${escapeHTML(row.ip)}')">
Remove
</button>
</td>
</tr>
`).join("")}
</tbody>
</table>`
}

async function addIpBan(){

const ip=document.getElementById("ban-ip").value.trim()
const reason=document.getElementById("ban-ip-reason").value.trim()

if(!ip)return

await db.from("banned_ips").insert({ip,reason})

showStatus("IP banned")

loadIpBans()
}

async function removeIpBan(ip){

await db.from("banned_ips").delete().eq("ip",ip)

showStatus("IP ban removed")

loadIpBans()
}

window.onload = init
</script>

<style>
#access-denied{
display:none;
text-align:center;
padding:60px 20px;
font:20pt ToonatorFont;
color:#888
}

#mod-content{
display:none
}
</style>
</head>

<body>

<div id="content_wrap">
<div id="content">

<div id="access-denied">
You don't have permission to view this page.
</div>

<div id="mod-content">

<h1>Mod Panel</h1>

<button class="mod-btn btn-remove" onclick="logout()">Log Out</button>

<div class="mod-status" id="mod-status"></div>

<div class="mod-section">
<h2>Ban User</h2>

<div class="mod-row">
<input class="mod-input" type="text" id="search-username" placeholder="Username...">
<button class="mod-btn btn-search" onclick="searchUser()">Search</button>
</div>

<div id="user-result"></div>
</div>

<div class="mod-section">
<h2>Roles</h2>

<div class="mod-row">
<input class="mod-input" type="text" id="role-username" placeholder="Username...">

<select id="role-select">
<option value="user">user</option>
<option value="mod">mod</option>
<option value="admin">admin</option>
</select>

<button class="mod-btn btn-promote" onclick="setRole()">Set Role</button>
</div>

<div id="role-result"></div>
</div>

<div class="mod-section">
<h2>IP Bans</h2>

<div class="mod-row">
<input class="mod-input" type="text" id="ban-ip" placeholder="IP address...">
<input class="mod-input" type="text" id="ban-ip-reason" placeholder="Reason (optional)">
<button class="mod-btn btn-add-ip" onclick="addIpBan()">Add Ban</button>
</div>

<div id="ip-list">Loading...</div>

</div>

</div>
</div>
</div>

</body>
</html>
