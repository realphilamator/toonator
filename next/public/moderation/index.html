);

let currentUserRole = null;

async function promptLogin() {
  const email = prompt("Admin email:");
  if (!email) return;
  const password = prompt("Password:");
  if (!password) return;
  const { error } = await db.auth.signInWithPassword({ email, password });
  if (error) { alert("Login failed: " + error.message); return; }
  location.reload();
}

async function logout() {
  await db.auth.signOut();
  location.reload();
}

async function init() {
  const { data: { user } } = await db.auth.getUser();
  if (!user) {
    showDenied(`Moderator login required.<br><br><button onclick="promptLogin()">Sign In</button>`);
    return;
  }
  const { data: profile } = await db.from("profiles").select("role").eq("id", user.id).single();
  currentUserRole = profile?.role || "user";
  if (currentUserRole !== "mod" && currentUserRole !== "admin") {
    showDenied(`You don't have permission to view this page.<br><br><button onclick="logout()">Log Out</button>`);
    return;
  }
  document.getElementById("mod-content").style.display = "block";
  document.getElementById("current-role").textContent = currentUserRole;
  loadIpBans();
  loadRecentReports();
}

function showDenied(html) {
  const el = document.getElementById("access-denied");
  el.innerHTML = html;
  el.style.display = "block";
}

function escapeHTML(str) {
  return String(str || "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

function showStatus(msg, ok = true) {
  const el = document.getElementById("mod-status");
  el.textContent = msg;
  el.className = "mod-status " + (ok ? "ok" : "err");
  setTimeout(() => { el.textContent = ""; el.className = "mod-status"; }, 5000);
}

/* ══════════════════════════════════════════
   USER SEARCH
══════════════════════════════════════════ */
async function searchUser() {
  const username = document.getElementById("search-username").value.trim();
  if (!username) return;
  const { data } = await db.from("profiles").select("id,username,role").ilike("username", "%" + username + "%").limit(10);
  const el = document.getElementById("user-result");
  if (!data || data.length === 0) { el.innerHTML = '<div class="mp-empty">No users found.</div>'; return; }
  el.innerHTML = data.map(u => `
    <div class="mp-user-row">
      <span class="username ${escapeHTML(u.role)}">${escapeHTML(u.username)}</span>
      <span class="grayb">(${escapeHTML(u.role)})</span>
      <span class="mp-actions">
        <button onclick="loadUserToons('${escapeHTML(u.id)}','${escapeHTML(u.username)}')">View Toons</button>
        <button onclick="loadUserComments('${escapeHTML(u.id)}','${escapeHTML(u.username)}')">View Comments</button>
        ${currentUserRole === 'admin' ? `<button class="btn-danger" onclick="banUser('${escapeHTML(u.id)}','${escapeHTML(u.username)}')">Ban &amp; Delete All</button>` : ''}
      </span>
    </div>
  `).join("");
}

/* ══════════════════════════════════════════
   TOON MANAGEMENT
══════════════════════════════════════════ */
async function loadUserToons(userId, username) {
  const section = document.getElementById("toon-section");
  const list = document.getElementById("toon-list");
  document.getElementById("toon-section-title").textContent = username + "'s toons";
  section.style.display = "block";
  list.innerHTML = "Loading...";
  section.scrollIntoView({ behavior: "smooth", block: "start" });

  const { data, error } = await db
    .from("animations")
    .select("id,title,created_at,is_draft,likes")
    .eq("user_id", userId)
    .order("created_at", { ascending: false })
    .limit(50);

  if (error) { list.innerHTML = `<div class="mp-empty red">${escapeHTML(error.message)}</div>`; return; }
  if (!data || data.length === 0) { list.innerHTML = '<div class="mp-empty">No toons.</div>'; return; }
  renderToonList(data);
}

async function searchToonById() {
  const id = document.getElementById("toon-id-input").value.trim();
  if (!id) return;
  const section = document.getElementById("toon-section");
  const list = document.getElementById("toon-list");
  document.getElementById("toon-section-title").textContent = "Toon search";
  section.style.display = "block";
  list.innerHTML = "Searching...";
  section.scrollIntoView({ behavior: "smooth", block: "start" });

  const { data, error } = await db.from("animations").select("id,title,created_at,user_id,is_draft,likes").eq("id", id).limit(1);
  if (error || !data || data.length === 0) { list.innerHTML = '<div class="mp-empty">Toon not found.</div>'; return; }
  renderToonList(data);
}

function renderToonList(toons) {
  document.getElementById("toon-list").innerHTML = toons.map(t => `
    <div class="mp-toon-row" id="toon-${escapeHTML(String(t.id))}">
      <span class="mp-toon-title">
        <a href="/toon/${escapeHTML(String(t.id))}" target="_blank">${escapeHTML(t.title || "Untitled")}</a>
      </span>
      ${t.is_draft ? '<span class="badge draft">draft</span>' : ''}
      <span class="grayb small">${t.likes || 0} ♥</span>
      <span class="grayb small">${t.created_at ? new Date(t.created_at).toLocaleDateString() : "—"}</span>
      <span class="mp-actions">
        <button onclick="viewToonComments('${escapeHTML(String(t.id))}')">Comments</button>
        <button onclick="resetLikes('${escapeHTML(String(t.id))}')">Reset Likes</button>
        <button onclick="toggleDraft('${escapeHTML(String(t.id))}', ${t.is_draft})">${t.is_draft ? 'Undraft' : 'Draft'}</button>
        <button class="btn-danger" onclick="deleteToon('${escapeHTML(String(t.id))}')">Delete</button>
      </span>
    </div>
  `).join("");
}

async function deleteToon(toonId) {
  if (!confirm("Delete toon " + toonId + "? This cannot be undone.")) return;
  // Delete comments and likes first, then the toon
  await db.from("comments").delete().eq("animation_id", toonId);
  await db.from("likes").delete().eq("animation_id", toonId);
  const { error } = await db.from("animations").delete().eq("id", toonId);
  if (error) { showStatus("Error: " + error.message, false); return; }
  document.getElementById("toon-" + toonId)?.remove();
  showStatus("Toon deleted.");
}

async function resetLikes(toonId) {
  if (!confirm("Reset all likes on this toon?")) return;
  await db.from("likes").delete().eq("animation_id", toonId);
  const { error } = await db.from("animations").update({ likes: 0 }).eq("id", toonId);
  if (error) { showStatus("Error: " + error.message, false); return; }
  // Update displayed count
  const row = document.getElementById("toon-" + toonId);
  if (row) { const likes = row.querySelector(".grayb.small"); if (likes) likes.textContent = "0 ♥"; }
  showStatus("Likes reset.");
}

async function toggleDraft(toonId, currentlyDraft) {
  const newVal = !currentlyDraft;
  const { error } = await db.from("animations").update({ is_draft: newVal }).eq("id", toonId);
  if (error) { showStatus("Error: " + error.message, false); return; }
  showStatus(newVal ? "Toon set to draft." : "Toon published.");
  // Refresh the row button
  const btn = document.querySelector(`#toon-${toonId} button[onclick*="toggleDraft"]`);
  if (btn) { btn.textContent = newVal ? "Undraft" : "Draft"; btn.setAttribute("onclick", `toggleDraft('${toonId}', ${newVal})`); }
  const badge = document.querySelector(`#toon-${toonId} .badge.draft`);
  if (newVal && !badge) {
    document.querySelector(`#toon-${toonId} .mp-toon-title`).insertAdjacentHTML('afterend', '<span class="badge draft">draft</span>');
  } else if (!newVal && badge) {
    badge.remove();
  }
}

/* ══════════════════════════════════════════
   COMMENT MANAGEMENT
══════════════════════════════════════════ */
async function loadUserComments(userId, username) {
  const section = document.getElementById("comment-section");
  const list = document.getElementById("comment-list");
  document.getElementById("comment-section-title").textContent = username + "'s comments";
  section.style.display = "block";
  list.innerHTML = "Loading...";
  section.scrollIntoView({ behavior: "smooth", block: "start" });

  const { data, error } = await db
    .from("comments")
    .select("id,text,created_at,animation_id")
    .eq("user_id", userId)
    .order("created_at", { ascending: false })
    .limit(50);

  if (error) { list.innerHTML = `<div class="mp-empty red">${escapeHTML(error.message)}</div>`; return; }
  if (!data || data.length === 0) { list.innerHTML = '<div class="mp-empty">No comments.</div>'; return; }
  renderCommentList(data);
}

async function viewToonComments(toonId) {
  const section = document.getElementById("comment-section");
  const list = document.getElementById("comment-list");
  document.getElementById("comment-section-title").textContent = "Comments on toon " + toonId.slice(0, 8) + "…";
  section.style.display = "block";
  list.innerHTML = "Loading...";
  section.scrollIntoView({ behavior: "smooth", block: "start" });

  const { data, error } = await db
    .from("comments")
    .select("id,text,created_at,author_username,user_id")
    .eq("animation_id", toonId)
    .order("created_at", { ascending: false });

  if (error) { list.innerHTML = `<div class="mp-empty red">${escapeHTML(error.message)}</div>`; return; }
  if (!data || data.length === 0) { list.innerHTML = '<div class="mp-empty">No comments.</div>'; return; }

  // Add bulk delete button
  list.innerHTML = `<div style="margin-bottom:8px;"><button class="btn-danger" onclick="deleteAllToonComments('${escapeHTML(toonId)}')">Delete All Comments</button></div>`;
  list.innerHTML += renderCommentListHTML(data);
}

async function deleteAllToonComments(toonId) {
  if (!confirm("Delete ALL comments on this toon?")) return;
  const { error } = await db.from("comments").delete().eq("animation_id", toonId);
  if (error) { showStatus("Error: " + error.message, false); return; }
  document.getElementById("comment-list").innerHTML = '<div class="mp-empty">All comments deleted.</div>';
  showStatus("All comments deleted.");
}

function renderCommentList(comments) {
  document.getElementById("comment-list").innerHTML = renderCommentListHTML(comments);
}

function renderCommentListHTML(comments) {
  return comments.map(c => `
    <div class="mp-comment-row" id="comment-${escapeHTML(String(c.id))}">
      ${c.author_username ? `<span class="username">${escapeHTML(c.author_username)}</span>` : ''}
      <span class="mp-comment-text">${escapeHTML(c.text)}</span>
      <span class="grayb small">${c.created_at ? new Date(c.created_at).toLocaleDateString() : "—"}</span>
      ${c.animation_id ? `<a href="/toon/${escapeHTML(String(c.animation_id))}" target="_blank" class="grayb small">view toon</a>` : ''}
      <button class="btn-danger" style="margin-left:auto" onclick="deleteComment('${escapeHTML(String(c.id))}')">Delete</button>
    </div>
  `).join("");
}

async function deleteComment(commentId) {
  const { error } = await db.from("comments").delete().eq("id", commentId);
  if (error) { showStatus("Error: " + error.message, false); return; }
  document.getElementById("comment-" + commentId)?.remove();
  showStatus("Comment deleted.");
}

/* ══════════════════════════════════════════
   RECENT REPORTS / LATEST ACTIVITY
   Includes both animations and legacy_animations
══════════════════════════════════════════ */
async function loadRecentReports() {
  const el = document.getElementById("recent-toons");
  el.innerHTML = "Loading...";

  const [newRes, legacyRes] = await Promise.all([
    db.from("animations").select("id,title,created_at,user_id,is_draft").eq("is_draft", false).order("created_at", { ascending: false }).limit(20),
    db.from("legacy_animations").select("id,title,created_at,user_id,is_draft").eq("is_draft", false).order("created_at", { ascending: false }).limit(20),
  ]);

  const newToons    = (newRes.data    || []).map(t => ({ ...t, legacy: false }));
  const legacyToons = (legacyRes.data || []).map(t => ({ ...t, legacy: true  }));

  const all = [...newToons, ...legacyToons]
    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
    .slice(0, 20);

  if (!all.length) { el.innerHTML = '<div class="mp-empty">No recent toons.</div>'; return; }

  // Fetch usernames for all user IDs
  const userIds = [...new Set(all.map(t => t.user_id).filter(Boolean))];
  const { data: profiles } = await db.from("profiles").select("id,username").in("id", userIds);
  const userMap = Object.fromEntries((profiles || []).map(p => [p.id, p.username]));

  el.innerHTML = all.map(t => `
    <div class="mp-toon-row" id="recent-${escapeHTML(String(t.id))}">
      <span class="mp-toon-title">
        <a href="/toon/${escapeHTML(String(t.id))}" target="_blank">${escapeHTML(t.title || "Untitled")}</a>
      </span>
      ${t.legacy ? '<span class="badge" style="background:#888">legacy</span>' : ''}
      <span class="grayb small">${escapeHTML(userMap[t.user_id] || "unknown")}</span>
      <span class="grayb small">${t.created_at ? new Date(t.created_at).toLocaleDateString() : "—"}</span>
      <span class="mp-actions">
        <button onclick="${t.legacy ? `viewLegacyToonComments('${escapeHTML(String(t.id))}')` : `viewToonComments('${escapeHTML(String(t.id))}')`}">Comments</button>
        <button class="btn-danger" onclick="deleteAnyToon('${escapeHTML(String(t.id))}', ${t.legacy}, 'recent-${escapeHTML(String(t.id))}')">Delete</button>
      </span>
    </div>
  `).join("");
}

/* Delete from either animations or legacy_animations */
async function deleteAnyToon(toonId, isLegacy, rowId) {
  if (!confirm("Delete toon " + toonId + "? This cannot be undone.")) return;
  if (isLegacy) {
    await db.from("comments").delete().eq("legacy_animation_id", toonId);
    await db.from("likes").delete().eq("legacy_animation_id", toonId);
    const { error } = await db.from("legacy_animations").delete().eq("id", toonId);
    if (error) { showStatus("Error: " + error.message, false); return; }
  } else {
    await db.from("comments").delete().eq("animation_id", toonId);
    await db.from("likes").delete().eq("animation_id", toonId);
    const { error } = await db.from("animations").delete().eq("id", toonId);
    if (error) { showStatus("Error: " + error.message, false); return; }
  }
  document.getElementById(rowId)?.remove();
  showStatus("Toon deleted.");
}

/* View comments on a legacy toon */
async function viewLegacyToonComments(toonId) {
  const section = document.getElementById("comment-section");
  const list = document.getElementById("comment-list");
  document.getElementById("comment-section-title").textContent = "Comments on legacy toon " + String(toonId).slice(0, 8) + "…";
  section.style.display = "block";
  list.innerHTML = "Loading...";
  section.scrollIntoView({ behavior: "smooth", block: "start" });

  const { data, error } = await db
    .from("comments")
    .select("id,text,created_at,author_username,user_id,legacy_animation_id")
    .eq("legacy_animation_id", toonId)
    .order("created_at", { ascending: false });

  if (error) { list.innerHTML = `<div class="mp-empty red">${escapeHTML(error.message)}</div>`; return; }
  if (!data || data.length === 0) { list.innerHTML = '<div class="mp-empty">No comments.</div>'; return; }

  list.innerHTML = `<div style="margin-bottom:8px;"><button class="btn-danger" onclick="deleteAllLegacyToonComments('${escapeHTML(toonId)}')">Delete All Comments</button></div>`;
  list.innerHTML += renderCommentListHTML(data);
}

async function deleteAllLegacyToonComments(toonId) {
  if (!confirm("Delete ALL comments on this legacy toon?")) return;
  const { error } = await db.from("comments").delete().eq("legacy_animation_id", toonId);
  if (error) { showStatus("Error: " + error.message, false); return; }
  document.getElementById("comment-list").innerHTML = '<div class="mp-empty">All comments deleted.</div>';
  showStatus("All comments deleted.");
}

/* ══════════════════════════════════════════
   ROLES
══════════════════════════════════════════ */
async function setRole() {
  const username = document.getElementById("role-username").value.trim();
  const role = document.getElementById("role-select").value;
  if (!username) return;
  if (currentUserRole !== "admin") { showStatus("Only admins can change roles.", false); return; }
  const { data } = await db.from("profiles").update({ role }).ilike("username", username).select("username,role");
  if (!data || data.length === 0) { showStatus("User not found.", false); return; }
  showStatus("Role updated: " + data[0].username + " is now " + data[0].role);
}

/* ══════════════════════════════════════════
   BAN USER (admin only) — deletes all their content
══════════════════════════════════════════ */
async function banUser(userId, username) {
  if (currentUserRole !== "admin") { showStatus("Only admins can ban users.", false); return; }
  if (!confirm(`Ban ${username} and delete ALL their toons and comments? This cannot be undone.`)) return;

  showStatus("Banning...");

  // Get all their animation IDs first
  const { data: anims } = await db.from("animations").select("id").eq("user_id", userId);
  const animIds = (anims || []).map(a => a.id);

  // Delete comments on their toons
  if (animIds.length > 0) {
    await db.from("comments").delete().in("animation_id", animIds);
    await db.from("likes").delete().in("animation_id", animIds);
    await db.from("animations").delete().eq("user_id", userId);
  }

  // Delete their own comments
  await db.from("comments").delete().eq("user_id", userId);
  // Delete their likes
  await db.from("likes").delete().eq("user_id", userId);

  showStatus(`${username} banned and all content deleted.`);
  document.getElementById("user-result").innerHTML = '';
}

/* ══════════════════════════════════════════
   IP BANS
══════════════════════════════════════════ */
async function loadIpBans() {
  const { data } = await db.from("banned_ips").select("ip,reason,banned_at").order("banned_at", { ascending: false });
  const el = document.getElementById("ip-list");
  if (!data || data.length === 0) { el.innerHTML = '<div class="mp-empty">No banned IPs.</div>'; return; }
  el.innerHTML = `
    <table class="mp-table">
      <thead><tr><th>IP</th><th>Reason</th><th>Date</th><th></th></tr></thead>
      <tbody>
        ${data.map(row => `
          <tr>
            <td><code>${escapeHTML(row.ip)}</code></td>
            <td>${escapeHTML(row.reason || "—")}</td>
            <td>${row.banned_at ? new Date(row.banned_at).toLocaleDateString() : "—"}</td>
            <td><button onclick="removeIpBan('${escapeHTML(row.ip)}')">Remove</button></td>
          </tr>
        `).join("")}
      </tbody>
    </table>`;
}

async function addIpBan() {
  const ip = document.getElementById("ban-ip").value.trim();
  const reason = document.getElementById("ban-ip-reason").value.trim();
  if (!ip) return;
  await db.from("banned_ips").insert({ ip, reason });
  document.getElementById("ban-ip").value = "";
  document.getElementById("ban-ip-reason").value = "";
  showStatus("IP banned: " + ip);
  loadIpBans();
}

async function removeIpBan(ip) {
  await db.from("banned_ips").delete().eq("ip", ip);
  showStatus("IP ban removed: " + ip);
  loadIpBans();
}

/* ══════════════════════════════════════════
   STATS
══════════════════════════════════════════ */
async function loadStats() {
  const [anims, users, comments, likes] = await Promise.all([
    db.from("animations").select("id", { count: "exact", head: true }),
    db.from("profiles").select("id", { count: "exact", head: true }),
    db.from("comments").select("id", { count: "exact", head: true }),
    db.from("likes").select("id", { count: "exact", head: true }),
  ]);
  document.getElementById("stats-box").innerHTML = `
    <span class="stat-pill">🎞 ${anims.count ?? "?"} toons</span>
    <span class="stat-pill">👤 ${users.count ?? "?"} users</span>
    <span class="stat-pill">💬 ${comments.count ?? "?"} comments</span>
    <span class="stat-pill">♥ ${likes.count ?? "?"} likes</span>
  `;
}

window.onload = () => { init(); loadStats(); };
</script>

.mp-comment-row:last-child { border-bottom: none; }
.mp-comment-text {
  flex: 1;
  color: #333;
  word-break: break-word;
}

.badge {
  font: 8pt Arial;
  padding: 1px 6px;
  border-radius: 10px;
  color: #fff;
}
.badge.draft { background: #999; }

.mp-table {
  width: 100%;
  border-collapse: collapse;
  font: 10pt Arial;
  margin-top: 8px;
}
.mp-table th {
  text-align: left;
  padding: 4px 8px;
  border-bottom: 1px solid #cccccc;
  color: #555;
  font-size: 9pt;
}
.mp-table td {
  padding: 5px 8px;
  border-bottom: 1px solid #eeeeee;
  vertical-align: middle;
}
.mp-table tr:last-child td { border-bottom: none; }
.mp-table tr:hover td { background: #f5f5f5; }
.mp-table code {
  font-size: 9pt;
  background: #f4f4f4;
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid #e0e0e0;
}

.mp-empty { color: #888; font: 10pt Arial; padding: 8px 0; }
.grayb { color: #888; }
.small { font-size: 9pt; }

#toon-section, #comment-section { display: none; }

.stat-pill {
  display: inline-block;
  background: #eee;
  border-radius: 12px;
  padding: 3px 12px;
  font: 10pt Arial;
  margin-right: 6px;
  margin-bottom: 4px;
}

.mp-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.mp-header h1 {
  font: 18pt ToonatorFont;
  font-weight: normal;
  margin: 0;
}

.role-badge {
  font: 9pt Arial;
  background: #333;
  color: #fff;
  border-radius: 10px;
  padding: 2px 10px;
}
</style>
</head>
<body>
<div id="content_wrap">
<div id="content">

  <div id="access-denied">You don't have permission to view this page.</div>

  <div id="mod-content">

    <div class="mp-header">
      <h1>Mod Panel</h1>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="role-badge" id="current-role"></span>
        <button onclick="logout()">Log Out</button>
      </div>
    </div>

    <div id="stats-box" style="margin-bottom:12px;"></div>

    <div class="mod-status" id="mod-status"></div>

    <!-- Search User -->
    <div class="mp-section">
      <h2>🔍 Search User</h2>
      <div class="mp-row">
        <input type="text" id="search-username" placeholder="Username..." style="width:200px"
          onkeydown="if(event.key==='Enter') searchUser()">
        <button onclick="searchUser()">Search</button>
      </div>
      <div id="user-result"></div>
    </div>

    <!-- Recent Toons -->
    <div class="mp-section">
      <h2>🕐 Recent Toons <button style="font-size:9pt;height:22px;padding:1px 8px;" onclick="loadRecentReports()">Refresh</button></h2>
      <div id="recent-toons">Loading...</div>
    </div>

    <!-- Toon Search -->
    <div class="mp-section" id="toon-section">
      <h2>🎞 <span id="toon-section-title">Toons</span></h2>
      <div class="mp-row">
        <input type="text" id="toon-id-input" placeholder="Find toon by ID..." style="width:280px"
          onkeydown="if(event.key==='Enter') searchToonById()">
        <button onclick="searchToonById()">Find</button>
      </div>
      <div id="toon-list"></div>
    </div>

    <!-- Comment Section -->
    <div class="mp-section" id="comment-section">
      <h2>💬 <span id="comment-section-title">Comments</span></h2>
      <div id="comment-list"></div>
    </div>

    <!-- Roles (admin only) -->
    <div class="mp-section">
      <h2>🛡 Roles</h2>
      <div class="mp-row">
        <input type="text" id="role-username" placeholder="Username..." style="width:200px"
          onkeydown="if(event.key==='Enter') setRole()">
        <select id="role-select">
          <option value="user">user</option>
          <option value="mod">mod</option>
          <option value="admin">admin</option>
        </select>
        <button onclick="setRole()">Set Role</button>
      </div>
      <div class="mp-empty" style="font-size:9pt;">Admin only.</div>
    </div>

    <!-- IP Bans -->
    <div class="mp-section">
      <h2>🚫 IP Bans</h2>
      <div class="mp-row">
        <input type="text" id="ban-ip" placeholder="IP address..." style="width:160px"
          onkeydown="if(event.key==='Enter') addIpBan()">
        <input type="text" id="ban-ip-reason" placeholder="Reason (optional)" style="width:200px">
        <button onclick="addIpBan()">Add Ban</button>
      </div>
      <div id="ip-list">Loading...</div>
    </div>

  </div>

</div>
</div>
</body>
</html>
