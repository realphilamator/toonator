  <link rel="stylesheet" href="/css/images_ru.css">
  <link rel="stylesheet" href="/css/register.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const db = createClient(
      'https://ytyhhmwnnlkhhpvsurlm.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0eWhobXdubmxraGhwdnN1cmxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NzcwNTAsImV4cCI6MjA4ODU1MzA1MH0.XZVH3j6xftSRULfhdttdq6JGIUSgHHJt9i-vXnALjH0'
    );
  </script>
  <script src="/js/auth.js"></script>
  <script>
    async function loadIncludes() {
      const header = await fetch('/includes/header.html').then(r => r.text());
      const footer = await fetch('/includes/footer.html').then(r => r.text());
      const modal = await fetch('/includes/auth-modal.html').then(r => r.text());
      document.getElementById('header_placeholder').innerHTML = header;
      document.getElementById('footer_placeholder').innerHTML = footer;
      document.body.insertAdjacentHTML('beforeend', modal);
      updateAuthUI();
    }
    loadIncludes();
  </script>
</head>
<body>
<div id="header_placeholder"></div>
<div id="content_wrap">
  <div id="content">
    <div class="sn">
      <div class="content-sn registration">
        <h1>Регистрация</h1>

        <label>
          <p>Имя пользователя:</p>
          <!--
            FIX: maxlength enforced in HTML. Pattern hint shown to user.
            Allowed: letters, numbers, underscore, hyphen. 3–30 chars.
            This prevents usernames containing < > " ' which are the root
            cause of the stored XSS vector in auth.js's updateAuthUI().
          -->
          <input class="input" type="text" id="reg_username" maxlength="30"
                 placeholder="Letters, numbers, _ or -">
          <span class="error" id="err_username" style="display:none;">
            Имя пользователя должно содержать от 3 до 30 символов: только буквы, цифры, _ или -
          </span>
        </label>

        <label>
          <p>Пароль:</p>
          <input class="input" type="password" id="reg_password1">
          <span class="error" id="err_password" style="display:none;">no password</span>
        </label>

        <label>
          <p>Повторите пароль:</p>
          <input class="input" type="password" id="reg_password2">
          <span class="error" id="err_password_match" style="display:none;">passwords don't match</span>
        </label>

        <label>
          <p>E-mail:</p>
          <input class="input" type="text" id="reg_email">
          <span class="error" id="err_email" style="display:none;">no email</span>
        </label>

        <div class="label">
          <p></p>
          <button class="complete" id="reg_submit" disabled onclick="registerUser()">Регистрация</button>
        </div>

        <div class="error" id="err_general" style="display:none; margin-top:10px;"></div>
      </div>
    </div>
    <div style="clear:both"></div>
  </div>
  <div id="footer_placeholder"></div>
</div>

<script>
// FIX: strict username pattern — only alphanumeric, underscore, hyphen, 3–30 chars.
// This is the critical fix: a username with < > or <script> would become a stored
// XSS payload displayed in auth.js's updateAuthUI() on every page for that user.
const USERNAME_PATTERN = /^[a-zA-Z0-9_-]{3,30}$/;

const fields = ['reg_username', 'reg_password1', 'reg_password2', 'reg_email'];
fields.forEach(id => {
  document.getElementById(id).addEventListener('input', validateForm);
});

function validateForm() {
  const username = document.getElementById('reg_username').value.trim();
  const password1 = document.getElementById('reg_password1').value;
  const password2 = document.getElementById('reg_password2').value;
  const email = document.getElementById('reg_email').value.trim();

  // FIX: validate username format, not just presence
  const usernameValid = USERNAME_PATTERN.test(username);
  document.getElementById('err_username').style.display = (username && !usernameValid) ? 'inline' : 'none';
  document.getElementById('err_password').style.display = password1 ? 'none' : 'inline';
  document.getElementById('err_email').style.display = email ? 'none' : 'inline';
  document.getElementById('err_password_match').style.display =
    (password2 && password1 !== password2) ? 'inline' : 'none';

  const valid = usernameValid && password1 && password1 === password2 && email;
  document.getElementById('reg_submit').disabled = !valid;
}

async function registerUser() {
  const username = document.getElementById('reg_username').value.trim();
  const password = document.getElementById('reg_password1').value;
  const email = document.getElementById('reg_email').value.trim();

  // FIX: double-check username pattern before submitting, in case JS validation
  // was bypassed (e.g. via devtools)
  if (!USERNAME_PATTERN.test(username)) {
    document.getElementById('err_username').style.display = 'inline';
    document.getElementById('reg_submit').disabled = true;
    return;
  }

  const { data, error } = await db.auth.signUp({
    email,
    password,
    options: {
      data: { username, russian: true },
      emailRedirectTo: 'https://www.multator.site/'
    }
  });

  if (error) {
    document.getElementById('err_general').style.display = 'block';
    document.getElementById('err_general').innerText = error.message;
    return;
  }

  if (data.user) {
    await db.from('users').insert({
      id: data.user.id,
      username: username,
      russian: true
    });
  }

  // Tell the user to check their email instead of silently redirecting
  if (data.user && !data.session) {
    // Email confirmation is required
    document.getElementById('err_general').style.display = 'block';
    document.getElementById('err_general').style.color = 'green';
    document.getElementById('err_general').innerText = 
      'Проверьте вашу почту для подтверждения регистрации.';
    const errEl = document.getElementById('err_general');
    errEl.style.display = 'block';
    // FIX: use textContent not innerText to prevent injection via error messages
    errEl.textContent = error.message;
  } else {
    // Auto-confirmed, go home
    window.location.href = '/';
  }
}
</script>
</body>
</html>
