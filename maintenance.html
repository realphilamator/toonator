<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title data-i18n="pages.maintenance.title">Технические работы - Мультатор</title>
<link rel="stylesheet" href="/style.css">

<style>
#content {
    text-align: center;
    padding-top: 120px;
}

#maintenance_box {
    width: 600px;
    margin: 120px auto;
    padding: 40px;
    text-align: center;
    background: #eeeeee;
    border-radius: 8px;
    border: 1px solid #cccccc;
}

#maintenance_box h1 {
    font-size: 32px;
    margin-bottom: 20px;
}

#maintenance_box p {
    font-size: 14px;
    text-align: center;
}

.status_dot {
    width: 10px;
    height: 10px;
    background: red;
    display: inline-block;
    border-radius: 50%;
    margin-right: 6px;
}
</style>
</head>

<body>

<div id="header_wrap">
<div id="header">
<a class="logo" href="/">
<img src="/img/multator40.gif" alt="Мультатор">
</a>
</div>
</div>

<div id="content_wrap">
<div id="content">

<div id="maintenance_box">

<h1 data-i18n="pages.maintenance.heading">
Технические работы
</h1>

<p>
<span class="status_dot"></span>
<span data-i18n="pages.maintenance.status">
Сайт временно недоступен из-за технических работ.
</span>
</p>

<p data-i18n="pages.maintenance.updates">
Мы проводим обновления и улучшения.
</p>

<p data-i18n="pages.maintenance.return_later">
Пожалуйста, зайдите позже.
</p>

</div>

</div>
</div>

<div id="footer">
    <p style="text-align:center;">multator.ru</p>
</div>

</body>
</html>
