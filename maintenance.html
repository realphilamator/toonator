<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title data-i18n="pages.maintenance.title">Maintenance - Toonator</title>
<link rel="stylesheet" href="/style.css">

<style>
#content {
    text-align: center;
    padding-top: 120px;
}

#maintenance_box {
    width: 600px;
    margin: 120px auto;
    padding: 40px;
    text-align: center;
    background: #eeeeee;
    border-radius: 8px;
    border: 1px solid #cccccc;
}

#maintenance_box h1 {
    font-size: 32px;
    margin-bottom: 20px;
}

#maintenance_box p {
    font-size: 14px;
    text-align: center;
}

.status_dot {
    width: 10px;
    height: 10px;
    background: red;
    display: inline-block;
    border-radius: 50%;
    margin-right: 6px;
}
</style>
</head>

<body>

<div id="header_wrap">
<div id="header">
<a class="logo" href="/">
<img src="/img/toonator40.png" alt="Toonator">
</a>
</div>
</div>

<div id="content_wrap">
<div id="content">

<div id="maintenance_box">

<h1 data-i18n="pages.maintenance.heading">
Site Maintenance
</h1>

<p>
<span class="status_dot"></span>
<span data-i18n="pages.maintenance.status">
The site is temporarily offline for maintenance.
</span>
</p>

<p data-i18n="pages.maintenance.updates">
We're doing some updates and improvements.
</p>

<p data-i18n="pages.maintenance.return_later">
Please check back later today.
</p>

</div>

</div>
</div>

<div id="footer">
    <p style="text-align:center;">toonator.com</p>
</div>

</body>
</html>
