<script>
async function loadIncludes() {
  const header = await fetch('/includes/header.html').then(r => r.text());
  const footer = await fetch('/includes/footer.html').then(r => r.text());
  const modal = await fetch('/includes/auth-modal.html').then(r => r.text());

<script>
var inFullScreen = { value: false };
$(function(){
    function fullscreenChanged(){
        var fullscreen =
            document.fullscreenElement ||
            document.webkitFullscreenElement ||
            document.mozFullScreenElement;
        if(fullscreen){
            inFullScreen.value = true;
            $('#draw_container').css({
                position:'absolute',
                left:0, top:0, right:0, bottom:0,
                width:'', height:''
            });
            // Resize Ruffle player to fill container
            var player = document.getElementById('rufflePlayer');
            if (player) {
                player.style.width = '100%';
                player.style.height = '100%';
            }
        } else {
            inFullScreen.value = false;
            $('#draw_container').css({
                position:'static',
                width:'600px',
                height:'390px'
            });
            var player = document.getElementById('rufflePlayer');
            if (player) {
                player.style.width = '600px';
                player.style.height = '390px';
            }
            hideRightPanel();
        }
    }
    document.addEventListener("fullscreenchange", fullscreenChanged);
    document.addEventListener("webkitfullscreenchange", fullscreenChanged);
    document.addEventListener("mozfullscreenchange", fullscreenChanged);
});

function toggleFullscreen(){
    var dc = $('#draw_container')[0];
    if(!inFullScreen.value){
        if(dc.requestFullscreen) dc.requestFullscreen();
        else if(dc.webkitRequestFullscreen) dc.webkitRequestFullscreen();
        else if(dc.mozRequestFullScreen) dc.mozRequestFullScreen();
    } else {
        if(document.exitFullscreen) document.exitFullscreen();
        else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if(document.mozCancelFullScreen) document.mozCancelFullScreen();
    }
}

function hideRightPanel() {
  $('.rightpanel').fadeOut();
  var newW = 1000;
  var newH = Math.round(newW / 2) + 90;
  $('#draw_container').animate({ width: newW }, 100, function() {
    var container = document.getElementById('ruffleContainer');
    var player = document.getElementById('rufflePlayer');
    if (container) { container.style.width = newW + 'px'; container.style.height = newH + 'px'; }
    if (player) { player.style.width = newW + 'px'; player.style.height = newH + 'px'; }
    $('#draw_container').css('height', newH + 'px');
  });
}
</script>
</head>
<body>
<div id="header_placeholder"></div>
<div id="content_wrap">
  <div id="content">
    <h2 id="drawPageTitle">New animation</h2>
    <span style="display:inline-block; background:#cccccc; padding:10px; vertical-align:top; font-size:0; line-height:0;">
      <div id="draw_container" style="width:600px; height:390px;">
        <div id="ruffleContainer" style="width:600px; height:390px;"></div>
      </div>
    </span>
    <span class="rightpanel" style="display:inline-block; width:370px; vertical-align:top;">
      <a href="#" style="font:8pt Tahoma; float:right; color:#000" onclick="hideRightPanel(); return false;">hide</a>
      <span id="palettePrompt">
        Click <a href="#" onclick="enablePalette(); return false;">here</a> to enable palette.
      </span>
      <br><br>
      <a href="/wiki/Editor">Help</a>
    </span>

    <script>
    // Update page title if continuing
    (function() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('continue')) {
        document.getElementById('drawPageTitle').textContent = 'Continue animation';
      }
    })();

    // -------------------------------------------------------------------------
    // ExternalInterface bridge: functions the SWF calls into JS
    // -------------------------------------------------------------------------

    // toggleFullscreen() is already defined in the <head> above — the SWF calls
    // it directly when the user presses F inside the editor.

    // m.lockExit('draw') / m.lockExit('draw', false)
    // SWF calls this to set/clear a "you have unsaved changes" beforeunload guard.
    window.m = window.m || {};
    window.m.lockExit = function(key, lock) {
      if (lock === false) {
        window.onbeforeunload = null;
      } else {
        window.onbeforeunload = function(e) {
          var msg = 'You have unsaved changes. Are you sure you want to leave?';
          e.returnValue = msg;
          return msg;
        };
      }
    };

    // -------------------------------------------------------------------------
    // Ruffle init + JS → SWF callback wiring
    // -------------------------------------------------------------------------
    window.addEventListener('load', function() {
      var ruffle = window.RufflePlayer.newest();
      var player = ruffle.createPlayer();
      player.id = 'rufflePlayer';
      player.style.width = '600px';
      player.style.height = '390px';
      player.style.display = 'block';
      document.getElementById('ruffleContainer').appendChild(player);
      player.load({
        url: '/swf/draw31en.swf',
        quality: 'high',
        allowScriptAccess: 'always',
        backgroundColor: '#ffffff',
        autoplay: 'on',
        unmuteOverlay: 'hidden',
        volume: 1
      });

      // enablePalette() is registered in AS3 via ExternalInterface.addCallback.
      // Ruffle exposes these on the player element; wire it to window so the
      // existing rightpanel "Click here to enable palette" link still works.
      // enablePalette — retries until the SWF has registered the callback via ExternalInterface
      window.enablePalette = function() {
        try {
          player.ruffle().callExposed('enablePalette');
        } catch(e) {
          setTimeout(window.enablePalette, 200);
        }
      };
    });
    </script>

    <div style="clear:both"></div>
  </div>
  <div id="footer_placeholder"></div>
</div>
</body>
