<script>
async function loadIncludes() {
  const header = await fetch('/includes/header.html').then(r => r.text());
  const footer = await fetch('/includes/footer.html').then(r => r.text());
  const modal = await fetch('/includes/auth-modal.html').then(r => r.text());

  document.getElementById('footer_placeholder').innerHTML = footer;
  document.body.insertAdjacentHTML('beforeend', modal);
  updateAuthUI();
}

<script>
var inFullScreen = { value: false };
$(function(){
    function fullscreenChanged(){
        var fullscreen =
            document.fullscreenElement ||
            document.webkitFullscreenElement ||
            document.mozFullScreenElement;
        if(fullscreen){
            inFullScreen.value = true;
            $('#draw_container').css({
                position:'absolute',
                left:0, top:0, right:0, bottom:0,
                width:'', height:''
            });
            // Resize Ruffle player to fill container
            var player = document.getElementById('rufflePlayer');
            if (player) {
                player.style.width = '100%';
                player.style.height = '100%';
            }
        } else {
            inFullScreen.value = false;
            $('#draw_container').css({
                position:'static',
                width:'600px',
                height:'390px'
            });
            var player = document.getElementById('rufflePlayer');
            if (player) {
                player.style.width = '600px';
                player.style.height = '390px';
            }
            hideRightPanel();
        }
    }
    document.addEventListener("fullscreenchange", fullscreenChanged);
    document.addEventListener("webkitfullscreenchange", fullscreenChanged);
    document.addEventListener("mozfullscreenchange", fullscreenChanged);
});

function toggleFullscreen(){
    var dc = $('#draw_container')[0];
    if(!inFullScreen.value){
        if(dc.requestFullscreen) dc.requestFullscreen();
        else if(dc.webkitRequestFullscreen) dc.webkitRequestFullscreen();
        else if(dc.mozRequestFullScreen) dc.mozRequestFullScreen();
    } else {
        if(document.exitFullscreen) document.exitFullscreen();
        else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if(document.mozCancelFullScreen) document.mozCancelFullScreen();
    }
}

function hideRightPanel() {
  $('.rightpanel').fadeOut();
  var newW = 1000;
  var newH = Math.round(newW / 2) + 90;
  $('#draw_container').animate({ width: newW }, 100, function() {
    var player = document.getElementById('rufflePlayer');
    if (player) {
        player.style.width = newW + 'px';
        player.style.height = newH + 'px';
    }
    $('#draw_container').css('height', newH + 'px');
  });
}
</script>

    <script>
    // Update page title if continuing

      const params = new URLSearchParams(window.location.search);

    })();
    </script>

    <div style="clear:both"></div>
  </div>
  <div id="footer_placeholder"></div>
</div>
